version: '3.9'

name: remember

services:
  server:
    build: ./server
    volumes:
      - ./server:/app      
    env_file:
      - ./server/.env
    depends_on:
      app_database:
        condition: service_healthy
    ports:
      - "4444:4444"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - S3_ENDPOINT=http://localstack:4566
      - S3_BUCKET=remember-profile-pictures
      - S3_FORCE_PATH_STYLE=true
  
  app_database:
    image: postgres:latest
    ports:
      - "5555:5432"
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: remember
      POSTGRES_USER: user 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d remember"]
      interval: 5s
      timeout: 5s
      retries: 5
