version: '3.9'

name: remember

services:
  server:
    build: ./server
    volumes:
      - ./server:/app      
    env_file:
      - ./server/.env
    depends_on:
      - aws
    ports:
      - "4444:4444"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - S3_ENDPOINT=http://localstack:4566
      - S3_BUCKET=remember-profile-pictures
      - S3_FORCE_PATH_STYLE=true
  aws:
    image: floci/floci:latest-aws
    ports:
      - "5555:4566"
    environment:
      - SERVICES=s3
